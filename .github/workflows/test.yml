name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: dotnet restore api.Tests/
      - run: dotnet build api.Tests/ --configuration Release --no-restore
      - run: dotnet test api.Tests/ --configuration Release --no-restore --logger "trx;LogFileName=results.trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-results
          path: '**/TestResults/*.trx'

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: ./web
        run: npm ci
      - working-directory: ./web
        run: npm run test:ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: web/coverage/

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd tests/e2e && npm ci
      - run: cd tests/e2e && npx playwright install --with-deps chromium
      - run: docker compose up -d --build --wait
      - run: cd tests/e2e && npx playwright test
      - run: docker compose down -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
