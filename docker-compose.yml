name: hackermanchat

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hackermanchat
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d hackermanchat"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"

  api:
    build:
      context: ./api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=hackermanchat;Username=chat;Password=chat
      ConnectionStrings__Redis: redis:6379
    volumes:
      - chatfiles:/data/chatfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  chatfiles:
